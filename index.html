<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>길목 (Gilmok) - 비즈니스 플랫폼</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=e03666d901543f8d3c81beeddcd6f319&libraries=services"></script>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #fcfaf7; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* 지도 레이아웃 */
        #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; filter: grayscale(0.1) contrast(1.05); }
        
        /* UI 레이어 */
        .ui-layer { position: relative; z-index: 10; width: 100%; height: 100%; pointer-events: none; }
        .ui-content { pointer-events: auto; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        
        /* 커스텀 마커 스타일 */
        .hot-zone-label { background: #ff4d00; color: white; padding: 4px 8px; border-radius: 8px; font-size: 10px; font-weight: 900; border: 1.5px solid white; box-shadow: 0 4px 10px rgba(255, 77, 0, 0.3); }
        .my-shop-marker { border: 4px solid #944a00; background: white; width: 26px; height: 26px; border-radius: 50%; box-shadow: 0 0 20px rgba(148, 74, 0, 0.5); animation: pulse-border 2s infinite; }
        
        @keyframes pulse-border { 
            0% { box-shadow: 0 0 0 0 rgba(148,74,0,0.7); } 
            70% { box-shadow: 0 0 0 20px rgba(148,74,0,0); } 
            100% { box-shadow: 0 0 0 0 rgba(148,74,0,0); } 
        }
    </style>
</head>
<body>

    <div id="onboarding" class="fixed inset-0 z-[100] bg-[#fff8ef] flex flex-col items-center justify-center p-8 text-center transition-all duration-500">
        <div class="mb-12 flex flex-col items-center gap-4">
            <div class="w-20 h-20 bg-[#ffdbc0] rounded-full flex items-center justify-center shadow-md text-[#944a00]">
                <span class="material-symbols-outlined text-5xl font-bold">local_fire_department</span>
            </div>
            <div>
                <h1 class="text-5xl font-extrabold text-[#944a00] tracking-tighter italic">길목</h1>
                <p class="text-[#77574e] font-bold text-xs uppercase tracking-[0.3em] mt-2 opacity-70">The Digital Hearth</p>
            </div>
        </div>
        <div class="grid gap-5 w-full max-w-sm ui-content">
            <button onclick="startApp('owner')" class="p-8 bg-white rounded-[2rem] shadow-sm text-left active:scale-95 transition-all border-none group">
                <span class="material-symbols-outlined text-4xl text-[#944a00] mb-2">storefront</span>
                <h3 class="text-xl font-black text-[#1e1b13]">사장님입니다</h3>
                <p class="text-sm text-stone-400 mt-1 font-medium">실시간 유동인구 분석 및 가격 관리</p>
            </button>
            <button onclick="startApp('user')" class="p-8 bg-white rounded-[2rem] shadow-sm text-left active:scale-95 transition-all border-none">
                <span class="material-symbols-outlined text-4xl text-[#5b6248] mb-2">shopping_bag</span>
                <h3 class="text-xl font-black text-[#1e1b13]">손님입니다</h3>
                <p class="text-sm text-stone-400 mt-1 font-medium">내 주변 깜짝 타임세일 발견</p>
            </button>
        </div>
    </div>

    <main id="main-app" class="hidden w-full h-full relative">
        <div id="map"></div>
        
        <div class="ui-layer flex flex-col justify-between p-5 pb-8">
            <header class="ui-content glass p-5 rounded-[2rem] shadow-xl border border-white/60">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-[10px] font-black text-[#944a00] uppercase tracking-widest bg-[#fff1e6] px-3 py-1 rounded-full">Live Analytics</span>
                    <button onclick="location.reload()" class="material-symbols-outlined text-stone-400">refresh</button>
                </div>
                <div class="flex items-end gap-2">
                    <h2 class="text-4xl font-black italic tracking-tighter" id="nearby-count">482명</h2>
                    <p class="text-sm font-bold text-stone-500 mb-1" id="nearby-text">매장 반경 200m 이내</p>
                </div>
            </header>

            <div id="bottom-ui" class="ui-content w-full max-w-lg mx-auto mb-20">
                <div id="owner-card" class="glass p-6 rounded-[2.5rem] shadow-2xl border border-white/40 hidden">
                    <h3 class="text-lg font-black italic mb-4">실시간 동적 가격 설정</h3>
                    <div class="grid grid-cols-2 gap-3 mb-5">
                        <button onclick="setPrice('10%')" class="bg-white/50 p-4 rounded-3xl text-center active:bg-[#944a00] active:text-white border border-stone-100 transition-all">
                            <p class="text-[10px] font-bold text-stone-400 mb-1">인구 보통</p>
                            <p class="text-xl font-black">10% 할인</p>
                        </button>
                        <button onclick="setPrice('30%')" class="bg-white p-4 rounded-3xl text-center shadow-lg border-2 border-[#944a00]">
                            <p class="text-[10px] font-black text-[#ff4d00] mb-1">혼잡도 폭발!</p>
                            <p class="text-xl font-black text-[#944a00]">30% 세일</p>
                        </button>
                    </div>
                    <div class="bg-stone-50/50 p-4 rounded-3xl mb-5">
                        <p class="text-[10px] font-bold text-stone-400 mb-1 uppercase tracking-tight">알림 전송 미리보기</p>
                        <p id="push-preview" class="text-sm font-medium leading-tight text-stone-600 italic">
                            "길목님! 지금 경기대 정문 '내 가게'에서 30% 타임세일 시작!"
                        </p>
                    </div>
                    <button onclick="publish()" class="w-full bg-[#1e1b13] text-white py-5 rounded-[1.5rem] font-bold text-lg shadow-xl active:scale-95 transition-all">
                        게시 및 푸시 전송
                    </button>
                </div>

                <div id="user-card" class="glass p-7 rounded-[2.5rem] shadow-2xl border border-white/40 hidden">
                    <p class="text-[#5b6248] font-bold text-[10px] uppercase tracking-widest mb-1">Nearby Benefits</p>
                    <h2 class="text-3xl font-black mb-1 italic">커피 40% 타임세일</h2>
                    <p class="text-sm text-stone-500 mb-6 font-medium">사장님이 직접 제안한 파격 특가!<br>지금 바로 쿠폰을 받으세요.</p>
                    <button class="w-full bg-gradient-to-br from-[#944a00] to-[#77574e] text-white py-5 rounded-[1.5rem] font-bold text-lg shadow-xl">쿠폰 확인하기</button>
                </div>
            </div>

            <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md h-20 glass rounded-[2.5rem] flex items-center justify-around shadow-2xl ui-content">
                <div class="flex flex-col items-center text-[#944a00]"><span class="material-symbols-outlined font-bold">explore</span><span class="text-[9px] font-bold mt-1">지도</span></div>
                <div class="relative -top-8"><button class="w-14 h-14 bg-[#944a00] rounded-full shadow-lg flex items-center justify-center text-white border-4 border-[#fff8ef]"><span class="material-symbols-outlined">analytics</span></button></div>
                <div class="flex flex-col items-center text-stone-400"><span class="material-symbols-outlined">settings</span><span class="text-[9px] font-bold mt-1">설정</span></div>
            </nav>
        </div>
    </main>

    <div id="toast" class="fixed bottom-32 left-1/2 -translate-x-1/2 z-[200] bg-black/80 backdrop-blur text-white px-8 py-4 rounded-full font-bold text-sm hidden">전송 완료! 주변 소비자에게 공유되었습니다.</div>

    <script>
        var map;
        var myStorePos = new kakao.maps.LatLng(37.3006, 127.0358); // 경기대 정문

        function startApp(role) {
            // 온보딩 숨기기 및 메인 표시
            document.getElementById('onboarding').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('onboarding').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                
                initMap(role);
            }, 500);

            // 역할별 UI 분기
            if (role === 'owner') {
                document.getElementById('owner-card').style.display = 'block';
            } else {
                document.getElementById('user-card').style.display = 'block';
                document.getElementById('nearby-count').innerText = "3건";
                document.getElementById('nearby-text').innerText = "내 주변 타임세일 중";
            }
        }

        function initMap(role) {
            var container = document.getElementById('map');
            var options = { center: myStorePos, level: 3 };
            map = new kakao.maps.Map(container, options);

            // 내 가게 마커
            new kakao.maps.CustomOverlay({
                position: myStorePos,
                content: '<div class="my-shop-marker"></div>'
            }).setMap(map);

            // 사장님일 경우에만 반경 및 핫존 표시
            if (role === 'owner') {
                new kakao.maps.Circle({
                    center: myStorePos,
                    radius: 200,
                    strokeWeight: 1,
                    strokeColor: '#944a00',
                    strokeOpacity: 0.8,
                    strokeStyle: 'dashed',
                    fillColor: '#944a00',
                    fillOpacity: 0.05
                }).setMap(map);

                // 가상 핫존 데이터
                var hotZones = [
                    { pos: new kakao.maps.LatLng(37.3015, 127.0345), count: 184 },
                    { pos: new kakao.maps.LatLng(37.3001, 127.0371), count: 120 }
                ];

                hotZones.forEach(zone => {
                    new kakao.maps.Circle({
                        center: zone.pos,
                        radius: 60,
                        strokeWeight: 0,
                        fillColor: '#ff4d00',
                        fillOpacity: 0.25
                    }).setMap(map);

                    new kakao.maps.CustomOverlay({
                        position: zone.pos,
                        content: `<div class="hot-zone-label">${zone.count}명</div>`,
                        yAnchor: 2.2
                    }).setMap(map);
                });
            }

            // 지도 깨짐 방지
            setTimeout(() => {
                map.relayout();
                map.setCenter(myStorePos);
            }, 100);
        }

        function setPrice(discount) {
            document.getElementById('push-preview').innerHTML = 
                `"길목님! 지금 경기대 정문 '내 가게'에서 <b>${discount} 타임세일</b> 시작!"`;
        }

        function publish() {
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
            console.log("알림 전송: " + document.getElementById('push-preview').innerText);
        }

        window.addEventListener('resize', () => { if(map) { map.relayout(); map.setCenter(myStorePos); } });
    </script>
</body>
</html>
