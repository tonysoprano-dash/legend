<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/tonysoprano-dash/legend/main/image_8.png">

    <title>길목 (Gilmok) - Real-time Business Map</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=e03666d901543f8d3c81beeddcd6f319&libraries=services"></script>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #f8f9fa; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* 지도 전체 화면 */
        #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* UI 레이어: 투명 처리하여 지도 조작 방해 금지 */
        .app-ui { position: relative; z-index: 10; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; }
        .interactive { pointer-events: auto; }
        
        /* 당근마켓 스타일 하단 탭 바 */
        .bottom-nav {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-top: 1px solid #eee;
            padding-bottom: env(safe-area-inset-bottom);
            height: calc(65px + env(safe-area-inset-bottom));
        }

        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; color: #666; transition: all 0.2s; }
        .nav-item.active { color: #ff7e36; } /* 당근마켓 오렌지 컬러 느낌 */
        .nav-item .material-symbols-outlined { font-size: 26px; }
        .nav-item span { font-size: 10px; font-weight: 600; }

        /* 플로팅 액션 버튼 (사장님 전용) */
        .fab-price {
            background: #944a00;
            color: white;
            padding: 14px 24px;
            border-radius: 30px;
            font-weight: 800;
            box-shadow: 0 10px 25px rgba(148, 74, 0, 0.4);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 핫존 오버레이 라벨 */
        .hot-label {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 800;
            color: white;
            border: 2px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        /* 페이드 효과 */
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <!-- 1. 앱 시작 온보딩 (첫 로딩 시에만 노출) -->
    <div id="onboarding" class="fixed inset-0 z-[100] bg-[#fff8ef] flex flex-col items-center justify-between p-12 py-24 text-center transition-all duration-700">
        <div class="flex flex-col items-center gap-6 mt-10">
            <img src="https://raw.githubusercontent.com/tonysoprano-dash/legend/main/image_8.png" alt="길목 로고" class="w-24 h-24 rounded-[2.2rem] shadow-2xl rotate-2 object-cover bg-white p-1">
            <h1 class="text-5xl font-extrabold text-[#944a00] tracking-tighter italic">길목</h1>
        </div>
        <div class="grid gap-4 w-full interactive">
            <button onclick="startApp('owner')" class="w-full py-6 bg-[#1e1b13] text-white rounded-3xl font-bold text-xl shadow-xl active:scale-95 transition-all">사장님 모드</button>
            <button onclick="startApp('user')" class="w-full py-6 bg-white text-[#1e1b13] border-2 border-stone-100 rounded-3xl font-bold text-xl active:scale-95 transition-all">손님 모드</button>
        </div>
    </div>

    <!-- 2. 메인 지도 인터페이스 -->
    <main id="main-app" class="hidden w-full h-full relative fade-in">
        <!-- 지도가 배경 전체를 차지함 -->
        <div id="map"></div>

        <div class="app-ui">
            <!-- 상단 검색/상태 헤더 -->
            <header class="p-4 pt-14 flex items-center gap-3 interactive">
                <div class="flex-grow bg-white/95 backdrop-blur shadow-lg rounded-2xl h-12 flex items-center px-4 gap-3 border border-stone-100">
                    <span class="material-symbols-outlined text-stone-400">search</span>
                    <span class="text-stone-400 font-medium text-sm">내 주변 핫존 검색</span>
                </div>
                <button onclick="location.reload()" class="w-12 h-12 bg-white/95 rounded-2xl shadow-lg flex items-center justify-center border border-stone-100">
                    <span class="material-symbols-outlined text-stone-700">logout</span>
                </button>
            </header>

            <div class="flex-grow"></div>

            <!-- 플로팅 액션 버튼 (역할별) -->
            <div class="flex justify-center mb-6 interactive">
                <div id="owner-action" class="hidden">
                    <button onclick="publishPrice()" class="fab-price active:scale-95 transition-all">
                        <span class="material-symbols-outlined">bolt</span>
                        다이내믹 프라이싱 실행
                    </button>
                </div>
                <div id="user-action" class="hidden">
                    <button class="bg-[#ff7e36] text-white px-8 py-4 rounded-full font-bold shadow-xl active:scale-95 transition-all flex items-center gap-2">
                        <span class="material-symbols-outlined">confirmation_number</span>
                        내 주변 쿠폰 받기
                    </button>
                </div>
            </div>

            <!-- 당근마켓 스타일 하단 네비게이션 -->
            <nav class="bottom-nav flex interactive">
                <button class="nav-item active">
                    <span class="material-symbols-outlined fill-1">home</span>
                    <span>홈</span>
                </button>
                <button class="nav-item">
                    <span class="material-symbols-outlined">explore</span>
                    <span>내 근처</span>
                </button>
                <button class="nav-item">
                    <span class="material-symbols-outlined">chat_bubble</span>
                    <span>채팅</span>
                </button>
                <button class="nav-item">
                    <span class="material-symbols-outlined">person</span>
                    <span>나의 길목</span>
                </button>
            </nav>
        </div>
    </main>

    <!-- 알림 토스트 -->
    <div id="toast" class="fixed top-24 left-1/2 -translate-x-1/2 z-[200] bg-black/85 text-white px-6 py-3 rounded-full font-bold text-sm hidden shadow-2xl transition-all">
        🚀 주변 소비자에게 실시간 알림이 전송되었습니다!
    </div>

    <script>
        var map;
        var centerPos = new kakao.maps.LatLng(37.3006, 127.0358); // 경기대

        function startApp(role) {
            document.getElementById('onboarding').style.transform = 'translateY(-100%)';
            setTimeout(() => {
                document.getElementById('onboarding').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                initMap(role);
                
                // 역할에 따른 버튼 활성화
                if(role === 'owner') document.getElementById('owner-action').style.display = 'block';
                else document.getElementById('user-action').style.display = 'block';
            }, 600);
        }

        function initMap(role) {
            var container = document.getElementById('map');
            map = new kakao.maps.Map(container, { center: centerPos, level: 3 });

            // 내 가게 위치
            new kakao.maps.CustomOverlay({
                position: centerPos,
                content: '<div style="width:24px; height:24px; background:#944a00; border:4px solid white; border-radius:50%; box-shadow:0 0 15px rgba(0,0,0,0.3);"></div>'
            }).setMap(map);

            // 가상 핫존 데이터 (인구수에 따른 색상 로직)
            var hotspots = [
                { pos: new kakao.maps.LatLng(37.3015, 127.0345), count: 210 }, // 빨강 (매우 혼잡)
                { pos: new kakao.maps.LatLng(37.3001, 127.0371), count: 115 }, // 주황 (보통)
                { pos: new kakao.maps.LatLng(37.2990, 127.0350), count: 45 }   // 초록 (여유)
            ];

            hotspots.forEach(spot => {
                var color, labelText;
                if(spot.count > 150) {
                    color = '#FF4D4D'; // 빨강
                    labelText = '혼잡';
                } else if(spot.count > 80) {
                    color = '#FFAA00'; // 주황
                    labelText = '보통';
                } else {
                    color = '#4CAF50'; // 초록
                    labelText = '여유';
                }

                // 히트맵 원형 시각화
                new kakao.maps.Circle({
                    center: spot.pos,
                    radius: 70,
                    strokeWeight: 0,
                    fillColor: color,
                    fillOpacity: 0.25
                }).setMap(map);

                // 인구수 라벨 오버레이
                var content = `<div class="hot-label" style="background:${color};">${spot.count}명 (${labelText})</div>`;
                new kakao.maps.CustomOverlay({
                    position: spot.pos,
                    content: content,
                    yAnchor: 2.2
                }).setMap(map);
            });

            // 지도 크기 재설정
            setTimeout(() => { map.relayout(); map.setCenter(centerPos); }, 200);
        }

        function publishPrice() {
            const toast = document.getElementById('toast');
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }
    </script>
</body>
</html>
