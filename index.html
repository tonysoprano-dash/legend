<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>길목 - 경기대 프로젝트</title>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=c6fa90ad968fa722bdc6d58024097828&libraries=services"></script>
    <style>
        /* [중요] 지도가 들어갈 상자의 크기를 명확히 지정해야 눈에 보입니다. */
        #map {
            width: 100%;
            height: 100vh; /* 화면 전체 높이 */
            background-color: #eee; /* 지도가 로드되기 전 회색으로 표시 */
        }
        body { margin: 0; padding: 0; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script>
        // 카카오 지도 라이브러리가 완전히 로드된 후 실행되도록 보장합니다.
        kakao.maps.load(function() {
            var container = document.getElementById('map'); // 지도를 담을 영역
            var options = {
                center: new kakao.maps.LatLng(37.3006, 127.0358), // 경기대 수원캠퍼스 정문 좌표
                level: 3 // 확대 레벨
            };

            // 드디어 지도를 생성합니다!
            var map = new kakao.maps.Map(container, options);

            // 마커 하나 찍어볼까요?
            var marker = new kakao.maps.Marker({
                position: new kakao.maps.LatLng(37.3006, 127.0358)
            });
            marker.setMap(map);
        });
    </script>
</body>
</html>
