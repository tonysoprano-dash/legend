<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>길목 (Gilmok) - Digital Hearth</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=78c841012e66821152dd7a637eb222a1&libraries=services&autoload=false"></script>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #fff8ef; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* 지도 영역: 화면 전체 점유 */
        #map { 
            width: 100%; 
            height: 100vh; 
            position: absolute; 
            top: 0; 
            left: 0; 
            z-index: 1;
            background-color: #d1d5db; /* 로딩 전 배경색 */
        }
        
        /* UI 레이어: 지도 위에 배치 */
        .ui-layer { z-index: 10; position: relative; pointer-events: none; }
        .ui-layer button, .ui-layer .card { pointer-events: auto; }
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    </style>
</head>
<body>

    <div id="onboarding" class="fixed inset-0 z-[100] bg-[#fff8ef] flex flex-col items-center justify-center p-8 text-center transition-opacity duration-500">
        <div class="mb-12 flex flex-col items-center gap-4">
            <div class="w-16 h-16 bg-[#ffdbc0] rounded-full flex items-center justify-center shadow-md">
                <span class="material-symbols-outlined text-[#944a00] text-4xl">local_fire_department</span>
            </div>
            <div>
                <h1 class="text-4xl font-extrabold text-[#944a00] tracking-tighter italic">길목</h1>
                <p class="text-[#77574e] font-bold text-[10px] uppercase tracking-[0.2em] mt-1">The Digital Hearth</p>
            </div>
        </div>
        
        <div class="grid gap-5 w-full max-w-sm">
            <button onclick="startApp('owner')" class="p-8 bg-white rounded-3xl shadow-sm text-left active:scale-95 transition-all border-none">
                <span class="material-symbols-outlined text-4xl text-[#944a00]">storefront</span>
                <h3 class="text-xl font-bold mt-2 text-[#1e1b13]">사장님입니다</h3>
                <p class="text-sm text-stone-500 mt-1">경기대 상권 유동인구 분석</p>
            </button>
            <button onclick="startApp('user')" class="p-8 bg-white rounded-3xl shadow-sm text-left active:scale-95 transition-all border-none">
                <span class="material-symbols-outlined text-4xl text-[#5b6248]">shopping_bag</span>
                <h3 class="text-xl font-bold mt-2 text-[#1e1b13]">손님입니다</h3>
                <p class="text-sm text-stone-500 mt-1">내 주변 실시간 할인 혜택</p>
            </button>
        </div>
    </div>

    <main id="main-app" class="hidden w-full h-full relative">
        <div id="map"></div>
        
        <div class="ui-layer h-full w-full flex flex-col justify-between p-6 pb-32">
            <header class="w-full flex justify-between items-center">
                <div class="bg-white/95 px-5 py-2 rounded-full shadow-sm font-black text-[#944a00] tracking-tight backdrop-blur-md">길목</div>
                <button onclick="location.reload()" class="bg-white/95 p-2 rounded-full shadow-sm border-none backdrop-blur-md">
                    <span class="material-symbols-outlined text-[#1e1b13]">logout</span>
                </button>
            </header>

            <div id="floating-card" class="w-full max-w-lg mb-4 card">
                <div class="bg-white rounded-3xl p-7 shadow-2xl border-none" id="card-content"></div>
            </div>

            <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[92%] max-w-md h-20 glass-nav rounded-[2.5rem] flex items-center justify-around shadow-xl border border-white/20">
                <div class="flex flex-col items-center text-[#944a00]"><span class="material-symbols-outlined">map</span><span class="text-[9px] font-bold mt-1 uppercase">지도</span></div>
                <div class="relative -top-7"><button class="w-16 h-16 bg-gradient-to-br from-[#944a00] to-[#77574e] rounded-full shadow-2xl flex items-center justify-center text-white border-[5px] border-[#fff8ef]"><span class="material-symbols-outlined text-3xl">bolt</span></button></div>
                <div class="flex flex-col items-center text-stone-400"><span class="material-symbols-outlined">person</span><span class="text-[9px] font-bold mt-1 uppercase">정보</span></div>
            </nav>
        </div>
    </main>

    <script>
        var map;
        var centerPos = new kakao.maps.LatLng(37.3006, 127.0358); // 경기대 수원캠

        function startApp(role) {
            document.getElementById('onboarding').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';

            // [가이드 준수] 지도를 안전하게 로드하는 코드
            if (window.kakao && window.kakao.maps) {
                kakao.maps.load(function() {
                    var container = document.getElementById('map');
                    var options = { center: centerPos, level: 3 };
                    
                    if (!map) {
                        map = new kakao.maps.Map(container, options);
                        new kakao.maps.Marker({ position: centerPos }).setMap(map);
                    }
                    
                    // 배포 환경 특유의 지도 짤림 현상 방지
                    setTimeout(function() {
                        map.relayout();
                        map.setCenter(centerPos);
                    }, 150);
                });
            }

            const card = document.getElementById('card-content');
            if (role === 'owner') {
                card.innerHTML = `<h2 class="text-2xl font-black mb-1 italic">유동인구 1,240명</h2><p class="text-sm text-stone-500 mb-6 font-medium leading-tight">경기대 정문 상권의 실시간 흐름입니다.</p><button class="w-full bg-[#944a00] text-white py-4 rounded-2xl font-bold border-none active:scale-[0.98]">동적 가격 규칙 실행</button>`;
            } else {
                card.innerHTML = `<h2 class="text-2xl font-black mb-1 italic">커피 40% 타임세일</h2><p class="text-sm text-stone-500 mb-6 font-medium leading-tight">지금 사장님이 올린 깜짝 혜택입니다.</p><button class="w-full bg-[#5b6248] text-white py-4 rounded-2xl font-bold border-none active:scale-[0.98]">쿠폰 받기</button>`;
            }
        }
    </script>
</body>
</html>
