<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>길목 (Gilmok) - 디지털 화로</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=c6fa90ad968fa722bdc6d58024097828&libraries=services"></script>
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fff8ef; margin: 0; padding: 0; overflow: hidden; }
        /* 지도가 들어갈 영역 설정 */
        #map { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 0; }
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .map-overlay { position: absolute; inset: 0; background: rgba(148, 74, 0, 0.03); pointer-events: none; z-index: 1; }
    </style>
</head>
<body class="min-h-screen">

    <div id="onboarding" class="fixed inset-0 z-50 bg-[#fff8ef] flex flex-col items-center justify-center p-8 text-center transition-opacity duration-500">
        <div class="mb-14 flex flex-col items-center gap-4">
            <div class="w-16 h-16 bg-[#ffdbc0] rounded-full flex items-center justify-center shadow-inner">
                <span class="material-symbols-outlined text-[#944a00] text-4xl">local_fire_department</span>
            </div>
            <div>
                <h1 class="text-4xl font-extrabold text-[#944a00] tracking-tighter">길목</h1>
                <p class="text-[#77574e] font-bold text-[10px] uppercase tracking-[0.2em] mt-1">The Digital Hearth</p>
            </div>
        </div>
        
        <h2 class="text-2xl font-bold mb-10 text-[#1e1b13]">어떤 길목에서 만날까요?</h2>
        
        <div class="grid gap-5 w-full max-w-sm">
            <button onclick="selectRole('owner')" class="group p-8 bg-white rounded-3xl shadow-sm text-left hover:shadow-md active:scale-95 transition-all border-none">
                <span class="material-symbols-outlined text-4xl text-[#944a00]">storefront</span>
                <h3 class="text-xl font-bold text-[#1e1b13] mt-3 group-hover:text-[#944a00]">사장님입니다</h3>
                <p class="text-sm text-stone-500 mt-2">상권 유동인구 분석 및 가격 설정</p>
            </button>

            <button onclick="selectRole('user')" class="group p-8 bg-white rounded-3xl shadow-sm text-left hover:shadow-md active:scale-95 transition-all border-none">
                <span class="material-symbols-outlined text-4xl text-[#5b6248]">shopping_bag</span>
                <h3 class="text-xl font-bold text-[#1e1b13] mt-3 group-hover:text-[#5b6248]">손님입니다</h3>
                <p class="text-sm text-stone-500 mt-2">지금 내 주변 깜짝 혜택 발견</p>
            </button>
        </div>
    </div>

    <main id="main-app" class="hidden w-full h-screen relative">
        <div id="map"></div>
        <div class="map-overlay"></div>

        <header class="absolute top-0 left-0 right-0 p-6 flex justify-between items-center z-20">
            <div class="bg-white/90 px-4 py-2 rounded-full shadow-sm backdrop-blur-md">
                <h1 class="text-lg font-black text-[#944a00] tracking-tight">길목</h1>
            </div>
            <button onclick="location.reload()" class="bg-white/90 p-2 rounded-full shadow-sm border-none">
                <span class="material-symbols-outlined text-[#1e1b13]">logout</span>
            </button>
        </header>

        <div id="floating-card" class="absolute bottom-32 left-1/2 -translate-x-1/2 w-[92%] max-w-lg z-20">
            <div class="bg-white rounded-3xl p-7 shadow-[0_20px_50px_rgba(0,0,0,0.1)] border-none">
                <div id="card-content"></div>
            </div>
        </div>

        <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[92%] max-w-md h-20 glass-nav rounded-[2.5rem] flex items-center justify-around z-30 shadow-xl border border-white/20">
            <div class="flex flex-col items-center text-[#944a00]">
                <span class="material-symbols-outlined">map</span>
                <span class="text-[9px] font-bold mt-1">지도</span>
            </div>
            <div class="relative -top-7">
                <button class="w-16 h-16 bg-gradient-to-br from-[#944a00] to-[#77574e] rounded-full shadow-2xl flex items-center justify-center text-white border-[5px] border-[#fff8ef] active:scale-90 transition-transform">
                    <span class="material-symbols-outlined text-3xl">bolt</span>
                </button>
            </div>
            <div class="flex flex-col items-center text-stone-400">
                <span class="material-symbols-outlined">person</span>
                <span class="text-[9px] font-bold mt-1">정보</span>
            </div>
        </nav>
    </main>

    <script>
        var map;

        function drawMap() {
            var container = document.getElementById('map');
            var options = {
                center: new kakao.maps.LatLng(37.3006, 127.0358), // 경기대 수원캠 정문
                level: 3
            };
            map = new kakao.maps.Map(container, options);

            // 마커 표시
            var marker = new kakao.maps.Marker({
                position: new kakao.maps.LatLng(37.3006, 127.0358)
            });
            marker.setMap(map);

            // 유동인구 범위를 나타내는 원
            var circle = new kakao.maps.Circle({
                center : new kakao.maps.LatLng(37.3006, 127.0358),
                radius: 120,
                strokeWeight: 0,
                fillColor: '#944a00',
                fillOpacity: 0.12
            });
            circle.setMap(map);
        }

        function selectRole(role) {
            document.getElementById('onboarding').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('onboarding').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                
                // 카카오 맵 로드 보장
                if (window.kakao && window.kakao.maps) {
                    kakao.maps.load(drawMap);
                } else {
                    alert("지도 라이브러리 로드 실패. 도메인 설정을 확인해주세요.");
                }
            }, 500);

            const cardContent = document.getElementById('card-content');
            if (role === 'owner') {
                cardContent.innerHTML = `
                    <p class="text-[#944a00] font-bold text-[10px] uppercase tracking-widest mb-1">경기대 정문 상권</p>
                    <h2 class="text-2xl font-black text-[#1e1b13] mb-3">현재 유동인구 1,240명</h2>
                    <p class="text-stone-500 text-sm mb-6 leading-relaxed">사람들이 모여들고 있습니다.<br>지금 '마중 가격' 규칙을 실행할까요?</p>
                    <button class="w-full bg-[#944a00] text-white py-4 rounded-full font-bold shadow-lg shadow-[#944a00]/20 border-none active:scale-[0.98] transition-transform">동적 가격 규칙 실행</button>
                `;
            } else {
                cardContent.innerHTML = `
                    <p class="text-[#5b6248] font-bold text-[10px] uppercase tracking-widest mb-1">실시간 길목 혜택</p>
                    <h2 class="text-2xl font-black text-[#1e1b13] mb-3">커피 40% 타임세일</h2>
                    <p class="text-stone-500 text-sm mb-6 leading-relaxed">지금 '카페 온도'에 방문하시면<br>모든 메뉴 40% 할인을 드립니다.</p>
                    <button class="w-full bg-gradient-to-br from-[#944a00] to-[#77574e] text-white py-4 rounded-full font-bold shadow-lg border-none active:scale-[0.98] transition-transform">쿠폰 발급받기</button>
                `;
            }
        }
    </script>
</body>
</html>
