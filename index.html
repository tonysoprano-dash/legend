<!DOCTYPE html>
<html lang="ko" class="light">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>길목 (Gilmok) - 디지털 화로</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=78c841012e66821152dd7a637eb222a1&libraries=services"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary': '#944a00',
                        'primary-container': '#ffdbc0',
                        'secondary': '#77574e',
                        'tertiary': '#5b6248', 
                        'surface': '#fff8ef',
                        'surface-container-low': '#f7f2ea',
                        'surface-container-lowest': '#ffffff',
                        'on-surface': '#1e1b13'
                    },
                    borderRadius: {
                        'DEFAULT': '1rem',
                        'lg': '2rem',
                        'xl': '3rem'
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fff8ef; color: #1e1b13; }
        .glass-nav { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(16px); }
        /* 지도가 전체 화면을 채우도록 설정 */
        #map { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 0; }
        .map-overlay { position: absolute; inset: 0; background: rgba(148, 74, 0, 0.02); pointer-events: none; z-index: 1; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center overflow-hidden">

    <div id="onboarding" class="fixed inset-0 z-50 bg-surface flex flex-col items-center justify-center p-8 text-center">
        <div class="mb-14 flex flex-col items-center gap-5">
            <svg width="64" height="64" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="24" cy="24" r="24" fill="#ffdbc0"/>
                <path d="M14 14C18 18.5 22 23.5 26 27.5C30 31.5 34 35.5 38 39.5" stroke="#944a00" stroke-width="4.5" stroke-linecap="round"/>
                <path d="M34 14C30 18.5 26 23.5 22 27.5C18 31.5 14 35.5 10 39.5" stroke="#77574e" stroke-width="4.5" stroke-linecap="round"/>
                <circle cx="25" cy="27" r="6" fill="#944a00"/>
            </svg>
            <div>
                <h1 class="text-4xl font-extrabold text-primary tracking-tighter mb-1">길목</h1>
                <p class="text-secondary font-medium uppercase tracking-[0.2em] text-[10px]">The Digital Hearth</p>
            </div>
        </div>
        <h2 class="text-2xl font-bold mb-10 text-on-surface tracking-tight">어떤 길목에서 만날까요?</h2>
        <div class="grid grid-cols-1 gap-5 w-full max-w-sm">
            <button onclick="selectRole('owner')" class="group p-8 bg-surface-container-lowest rounded-lg transition-all text-left shadow-sm hover:shadow-md active:scale-95 border-none">
                <span class="material-symbols-outlined text-4xl text-primary mb-4">storefront</span>
                <h3 class="text-xl font-bold text-on-surface group-hover:text-primary transition-colors font-['Plus_Jakarta_Sans']">사장님입니다</h3>
                <p class="text-sm text-stone-500 mt-2 leading-relaxed">경기대 앞 우리 매장 데이터를 분석하고<br>동적 가격 규칙을 설정해요.</p>
            </button>
            <button onclick="selectRole('user')" class="group p-8 bg-surface-container-lowest rounded-lg transition-all text-left shadow-sm hover:shadow-md active:scale-95 border-none">
                <span class="material-symbols-outlined text-4xl text-tertiary mb-4">shopping_bag</span>
                <h3 class="text-xl font-bold text-on-surface group-hover:text-tertiary transition-colors font-['Plus_Jakarta_Sans']">손님입니다</h3>
                <p class="text-sm text-stone-500 mt-2 leading-relaxed">지금 내 주변 길목에서만 만나는<br>깜짝 혜택을 발견해요.</p>
            </button>
        </div>
    </div>

    <main id="main-app" class="hidden w-full h-screen relative">
        <div id="map"></div>
        <div class="map-overlay"></div>

        <header class="absolute top-0 left-0 right-0 p-6 flex justify-between items-start z-20">
            <div class="flex items-center gap-2.5 px-4 py-2.5 bg-surface-container-lowest/80 backdrop-blur-xl rounded-full shadow-sm">
                <svg width="22" height="22" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="24" cy="24" r="24" fill="#ffdbc0"/>
                    <path d="M15 15C18.5 19 22 23 25.5 27" stroke="#944a00" stroke-width="6" stroke-linecap="round"/>
                    <path d="M33 15C29.5 19 26 23 22.5 27" stroke="#77574e" stroke-width="6" stroke-linecap="round"/>
                    <circle cx="24" cy="27" r="6" fill="#944a00"/>
                </svg>
                <h1 class="text-xl font-black text-primary tracking-tighter">길목</h1>
            </div>
            <button onclick="location.reload()" class="bg-surface-container-lowest/90 p-2.5 rounded-full shadow-sm active:scale-90 transition-all border-none">
                <span class="material-symbols-outlined text-on-surface text-xl">logout</span>
            </button>
        </header>

        <div id="floating-card" class="absolute bottom-32 left-1/2 -translate-x-1/2 w-[92%] max-w-lg z-20 transition-all duration-700">
            <div class="bg-surface-container-lowest rounded-lg p-7 shadow-[0_20px_50px_rgba(30,27,19,0.15)] border-none">
                <div id="card-content"></div>
            </div>
        </div>

        <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[92%] max-w-md h-22 glass-nav rounded-xl flex items-center justify-around px-2 z-30 shadow-lg">
            <a href="#" class="flex flex-col items-center text-primary">
                <span class="material-symbols-outlined text-2xl">map</span>
                <span class="text-[9px] font-extrabold mt-1.5 uppercase tracking-wider">지도</span>
            </a>
            <div class="relative -top-7">
                <button class="w-18 h-18 bg-gradient-to-br from-primary to-secondary rounded-full shadow-2xl flex items-center justify-center text-white active:scale-90 transition-all border-[6px] border-surface/50">
                    <span class="material-symbols-outlined text-3xl" id="center-icon">bolt</span>
                </button>
            </div>
            <a href="#" class="flex flex-col items-center text-stone-400">
                <span class="material-symbols-outlined text-2xl">person</span>
                <span class="text-[9px] font-extrabold mt-1.5 uppercase tracking-wider font-['Plus_Jakarta_Sans']">내 정보</span>
            </a>
        </nav>
    </main>

    <script>
        let map;

        // [중요] 지도를 그리는 핵심 함수
        function drawMap() {
            const container = document.getElementById('map');
            const options = {
                center: new kakao.maps.LatLng(37.3006, 127.0358), // 경기대 수원캠퍼스 좌표
                level: 3 // 확대 레벨
            };
            map = new kakao.maps.Map(container, options);

            // 유동인구 밀집도를 상징하는 원형 오버레이 추가
            const circle = new kakao.maps.Circle({
                center : new kakao.maps.LatLng(37.3006, 127.0358),
                radius: 120, 
                strokeWeight: 0,
                fillColor: '#944a00',
                fillOpacity: 0.12 
            });
            circle.setMap(map);
            
            // 경기대 마커 추가
            const marker = new kakao.maps.Marker({
                position: new kakao.maps.LatLng(37.3006, 127.0358)
            });
            marker.setMap(map);
        }

        function selectRole(role) {
            document.getElementById('onboarding').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            
            // [Vercel 최적화] 카카오 객체가 로드된 후 지도를 그리도록 보장
            if (window.kakao && window.kakao.maps) {
                kakao.maps.load(function() {
                    drawMap();
                });
            } else {
                alert("지도 라이브러리를 불러오지 못했습니다. 도메인 설정을 확인해주세요.");
            }

            const cardContent = document.getElementById('card-content');
            const centerIcon = document.getElementById('center-icon');

            if (role === 'owner') {
                centerIcon.innerText = "bolt"; 
                cardContent.innerHTML = `
                    <p class="text-primary font-bold text-[10px] uppercase tracking-[0.15em] mb-1.5">경기대 정문 길목 데이터</p>
                    <h2 class="text-3xl font-black text-on-surface tracking-tight mb-4">현재 1,240명<span class="text-sm font-medium opacity-40 ml-2">지나가는 중</span></h2>
                    <p class="text-stone-500 text-[13px] leading-relaxed mb-8">인구가 평소보다 <span class="text-primary font-bold">24%</span> 많습니다. 지금 즉시 '마중 가격' 규칙을 실행할까요?</p>
                    <button class="w-full bg-primary text-white py-4.5 rounded-full font-bold text-sm shadow-lg shadow-primary/20 active:scale-[0.97] transition-all border-none font-['Plus_Jakarta_Sans']">동적 가격 규칙 실행</button>
                `;
            } else {
                centerIcon.innerText = "explore"; 
                cardContent.innerHTML = `
                    <p class="text-tertiary font-bold text-[10px] uppercase tracking-[0.15em] mb-1.5">지금 내 주변 혜택</p>
                    <h2 class="text-2xl font-black text-on-surface leading-tight mb-4 font-['Plus_Jakarta_Sans']">사람들이 모여서<br><span class="text-primary text-3xl">가격이 내려갔어요!</span></h2>
                    <div class="bg-surface-container-low p-4 rounded-DEFAULT mb-8 flex items-center gap-4 border-none shadow-inner">
                        <span class="material-symbols-outlined text-primary">local_fire_department</span>
                        <p class="text-sm font-bold text-on-surface">경기대 후문 카페 '온도' 40% 할인</p>
                    </div>
                    <button class="w-full bg-gradient-to-br from-primary to-secondary text-white py-4.5 rounded-full font-bold text-sm shadow-xl active:scale-[0.97] transition-all border-none font-['Plus_Jakarta_Sans']">혜택 받으러 가기</button>
                `;
            }
        }
    </script>
</body>
</html>
