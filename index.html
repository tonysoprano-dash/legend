<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>길목 (Gilmok) App</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=e03666d901543f8d3c81beeddcd6f319&libraries=services"></script>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* 앱 레이아웃 */
        #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; filter: contrast(1.1); }
        .app-container { position: relative; z-index: 10; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; }
        
        /* 모바일 앱 특유의 하단 시트 */
        .bottom-sheet {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 2.5rem 2.5rem 0 0;
            padding: 1.5rem 1.5rem calc(1.5rem + env(safe-area-inset-bottom));
            box-shadow: 0 -10px 40px rgba(0,0,0,0.15);
            pointer-events: auto;
            transform: translateY(0);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        
        .handle { width: 40px; height: 5px; background: #e5e7eb; border-radius: 10px; margin: 0 auto 1.5rem; }
        .ui-content { pointer-events: auto; }
        
        /* 핫존 애니메이션 */
        .hot-zone-label { background: #ff4d00; color: white; padding: 4px 10px; border-radius: 10px; font-size: 11px; font-weight: 800; border: 2px solid white; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        
        .my-shop-marker { border: 4px solid #944a00; background: white; width: 28px; height: 28px; border-radius: 50%; box-shadow: 0 0 20px rgba(148, 74, 0, 0.6); }
    </style>
</head>
<body>

    <div id="onboarding" class="fixed inset-0 z-[100] bg-[#fff8ef] flex flex-col items-center justify-between p-12 py-20 text-center transition-all duration-700">
        <div class="flex flex-col items-center gap-6 mt-10">
            <div class="w-24 h-24 bg-gradient-to-br from-[#944a00] to-[#77574e] rounded-[2rem] flex items-center justify-center shadow-2xl rotate-3">
                <span class="material-symbols-outlined text-6xl text-white font-bold">local_fire_department</span>
            </div>
            <h1 class="text-5xl font-extrabold text-[#944a00] tracking-tighter italic">길목</h1>
        </div>
        
        <div class="grid gap-4 w-full ui-content">
            <button onclick="startApp('owner')" class="w-full py-6 bg-[#1e1b13] text-white rounded-[2rem] font-bold text-xl shadow-xl active:scale-95 transition-all">사장님으로 시작</button>
            <button onclick="startApp('user')" class="w-full py-6 bg-white text-[#1e1b13] border-2 border-stone-100 rounded-[2rem] font-bold text-xl active:scale-95 transition-all">손님으로 시작</button>
        </div>
    </div>

    <main id="main-app" class="hidden w-full h-full relative">
        <div id="map"></div>
        
        <div class="app-container">
            <header class="p-6 pt-12 flex justify-between items-start ui-content">
                <div class="bg-black/80 backdrop-blur-md px-5 py-3 rounded-3xl border border-white/20">
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>
                        <span class="text-sm font-black text-white italic tracking-widest">LIVE ANALYSIS</span>
                    </div>
                </div>
                <button onclick="location.reload()" class="bg-white/90 p-3 rounded-full shadow-lg border-none"><span class="material-symbols-outlined text-[#1e1b13]">logout</span></button>
            </header>

            <div class="flex-grow"></div>

            <div class="bottom-sheet ui-content">
                <div class="handle"></div>
                
                <div id="owner-ui" class="hidden">
                    <div class="flex justify-between items-center mb-6">
                        <div>
                            <p class="text-[11px] font-black text-[#944a00] uppercase tracking-widest">Nearby Population</p>
                            <h2 class="text-4xl font-black italic text-[#1e1b13]">1,248<span class="text-lg ml-1">명</span></h2>
                        </div>
                        <div class="text-right">
                            <span class="px-3 py-1 bg-red-100 text-red-600 rounded-full text-[10px] font-black">혼잡도 상</span>
                            <p class="text-[10px] font-bold text-stone-400 mt-1">최근 5분 기준</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3 mb-8">
                        <button onclick="setPrice('10%')" class="bg-stone-50 p-5 rounded-[1.5rem] border-2 border-transparent active:border-[#944a00] transition-all">
                            <p class="text-[10px] font-bold text-stone-400 mb-1 uppercase">Standard</p>
                            <p class="text-xl font-black">10% OFF</p>
                        </button>
                        <button onclick="setPrice('30%')" class="bg-stone-50 p-5 rounded-[1.5rem] border-2 border-[#ff4d00] shadow-lg shadow-[#ff4d00]/10">
                            <p class="text-[10px] font-black text-[#ff4d00] mb-1 uppercase">Hot Zone!</p>
                            <p class="text-xl font-black text-[#944a00]">30% OFF</p>
                        </button>
                    </div>

                    <button onclick="publish()" class="w-full bg-[#944a00] text-white py-5 rounded-[1.8rem] font-bold text-lg shadow-2xl active:scale-[0.97] transition-all">
                        실시간 다이내믹 프라이싱 실행
                    </button>
                </div>

                <div id="user-ui" class="hidden pb-4">
                    <h2 class="text-3xl font-black italic mb-2">커피 40% 타임세일</h2>
                    <p class="text-stone-500 font-medium mb-8 leading-tight italic text-sm">사장님이 현재 인구 폭주로 인해<br>깜짝 혜택을 제안했습니다!</p>
                    <button class="w-full bg-[#1e1b13] text-white py-5 rounded-[1.8rem] font-bold text-lg shadow-2xl">쿠폰 즉시 받기</button>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="fixed top-20 left-1/2 -translate-x-1/2 z-[200] bg-black/90 text-white px-8 py-4 rounded-full font-bold text-sm hidden shadow-2xl">🚀 주변 1km 이내 소비자에게 푸시 완료!</div>

    <script>
        var map;
        var centerPos = new kakao.maps.LatLng(37.3006, 127.0358);

        function startApp(role) {
            document.getElementById('onboarding').style.transform = 'translateY(-100%)';
            setTimeout(() => {
                document.getElementById('onboarding').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                initMap(role);
            }, 600);

            if (role === 'owner') {
                document.getElementById('owner-ui').classList.remove('hidden');
            } else {
                document.getElementById('user-ui').classList.remove('hidden');
            }
        }

        function initMap(role) {
            var container = document.getElementById('map');
            map = new kakao.maps.Map(container, { center: centerPos, level: 3 });

            // 내 가게 마커
            new kakao.maps.CustomOverlay({
                position: centerPos,
                content: '<div class="my-shop-marker"></div>'
            }).setMap(map);

            if (role === 'owner') {
                // 반경 및 핫존 시각화
                new kakao.maps.Circle({
                    center: centerPos, radius: 150,
                    strokeWeight: 0, fillColor: '#944a00', fillOpacity: 0.1
                }).setMap(map);

                var zones = [
                    { pos: new kakao.maps.LatLng(37.3015, 127.0345), count: 184 },
                    { pos: new kakao.maps.LatLng(37.3001, 127.0371), count: 120 }
                ];

                zones.forEach(z => {
                    new kakao.maps.CustomOverlay({
                        position: z.pos,
                        content: `<div class="hot-zone-label">${z.count}명</div>`,
                        yAnchor: 2.2
                    }).setMap(map);
                });
            }

            setTimeout(() => { map.relayout(); map.setCenter(centerPos); }, 200);
        }

        function publish() {
            const toast = document.getElementById('toast');
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }
        
        function setPrice(p) { /* 가격 설정 로직 */ }
    </script>
</body>
</html>
