<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>길목 (Gilmok) - 디지털 화로</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=c6fa90ad968fa722bdc6d58024097828&libraries=services"></script>
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fff8ef; margin: 0; padding: 0; overflow: hidden; }
        #map { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 0; }
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .map-overlay { position: absolute; inset: 0; background: rgba(148, 74, 0, 0.03); pointer-events: none; z-index: 1; }
    </style>
</head>
<body class="min-h-screen">

    <div id="onboarding" class="fixed inset-0 z-50 bg-[#fff8ef] flex flex-col items-center justify-center p-8 text-center">
        <div class="mb-14 flex flex-col items-center gap-4">
            <div class="w-16 h-16 bg-[#ffdbc0] rounded-full flex items-center justify-center">
                <span class="material-symbols-outlined text-[#944a00] text-4xl">local_fire_department</span>
            </div>
            <div>
                <h1 class="text-4xl font-extrabold text-[#944a00] tracking-tighter">길목</h1>
                <p class="text-[#77574e] font-bold text-[10px] uppercase tracking-[0.2em] mt-1">The Digital Hearth</p>
            </div>
        </div>
        
        <h2 class="text-2xl font-bold mb-10 text-[#1e1b13]">어떤 길목에서 만날까요?</h2>
        
        <div class="grid gap-5 w-full max-w-sm">
            <button onclick="selectRole('owner')" class="p-8 bg-white rounded-3xl shadow-sm text-left active:scale-95 transition-all border-none">
                <span class="material-symbols-outlined text-4xl text-[#944a00]">storefront</span>
                <h3 class="text-xl font-bold text-[#1e1b13] mt-3">사장님입니다</h3>
                <p class="text-sm text-stone-500 mt-2">상권 유동인구 분석 및 가격 설정</p>
            </button>
            <button onclick="selectRole('user')" class="p-8 bg-white rounded-3xl shadow-sm text-left active:scale-95 transition-all border-none">
                <span class="material-symbols-outlined text-4xl text-[#5b6248]">shopping_bag</span>
                <h3 class="text-xl font-bold text-[#1e1b13] mt-3">손님입니다</h3>
                <p class="text-sm text-stone-500 mt-2">지금 내 주변 깜짝 혜택 발견</p>
            </button>
        </div>
    </div>

    <main id="main-app" class="hidden w-full h-screen relative">
        <div id="map"></div>
        <div class="map-overlay"></div>

        <header class="absolute top-0 left-0 right-0 p-6 flex justify-between items-center z-20">
            <div class="bg-white/90 px-4 py-2 rounded-full shadow-sm">
                <h1 class="text-lg font-black text-[#944a00] tracking-tight">길목</h1>
            </div>
            <button onclick="location.reload()" class="bg-white/90 p-2 rounded-full shadow-sm border-none">
                <span class="material-symbols-outlined text-[#1e1b13]">logout</span>
            </button>
        </header>

        <div id="floating-card" class="absolute bottom-32 left-1/2 -translate-x-1/2 w-[92%] max-w-lg z-20">
            <div class="bg-white rounded-3xl p-7 shadow-2xl border-none">
                <div id="card-content"></div>
            </div>
        </div>

        <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[92%] max-w-md h-20 glass-nav rounded-[2.5rem] flex items-center justify-around z-30 shadow-xl border border-white/20">
            <div class="flex flex-col items-center text-[#944a00]">
                <span class="material-symbols-outlined">map</span>
                <span class="text-[9px] font-bold mt-1">지도</span>
            </div>
            <div class="relative -top-7">
                <button class="w-16 h-16 bg-gradient-to-br from-[#944a00] to-[#77574e] rounded-full shadow-2xl flex items-center justify-center text-white border-[5px] border-[#fff8ef]">
                    <span class="material-symbols-outlined text-3xl">bolt</span>
                </button>
            </div>
            <div class="flex flex-col items-center text-stone-400">
                <span class="material-symbols-outlined">person</span>
                <span class="text-[9px] font-bold mt-1">정보</span>
            </div>
        </nav>
    </main>

    <script>
        var map;
        var centerPos = new kakao.maps.LatLng(37.3006, 127.0358); // 경기대 좌표

        function drawMap() {
            var container = document.getElementById('map');
            var options = { center: centerPos, level: 3 };
            map = new kakao.maps.Map(container, options);

            new kakao.maps.Marker({ position: centerPos }).setMap(map);
            new kakao.maps.Circle({
                center: centerPos,
                radius: 120,
                strokeWeight: 0,
                fillColor: '#944a00',
                fillOpacity: 0.12
            }).setMap(map);
        }

        function selectRole(role) {
            // 1. 화면 전환
            document.getElementById('onboarding').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            
            // 2. 지도 초기화 및 리레이아웃 (중요!)
            if (window.kakao && window.kakao.maps) {
                kakao.maps.load(function() {
                    if (!map) {
                        drawMap();
                    }
                    // 숨겨져 있던 지도가 나타날 때 크기를 재계산하도록 강제 실행
                    setTimeout(function() {
                        map.relayout();
                        map.setCenter(centerPos);
                    }, 100);
                });
            }

            // 3. 역할별 카드 내용
            const cardContent = document.getElementById('card-content');
            if (role === 'owner') {
                cardContent.innerHTML = `
                    <p class="text-[#944a00] font-bold text-[10px] uppercase mb-1">경기대 정문 상권</p>
                    <h2 class="text-2xl font-black text-[#1e1b13] mb-3">현재 유동인구 1,240명</h2>
                    <button class="w-full bg-[#944a00] text-white py-4 rounded-full font-bold shadow-lg border-none">동적 가격 규칙 실행</button>
                `;
            } else {
                cardContent.innerHTML = `
                    <p class="text-[#5b6248] font-bold text-[10px] uppercase mb-1">실시간 길목 혜택</p>
                    <h2 class="text-2xl font-black text-[#1e1b13] mb-3">커피 40% 타임세일</h2>
                    <button class="w-full bg-gradient-to-br from-[#944a00] to-[#77574e] text-white py-4 rounded-full font-bold shadow-lg border-none">쿠폰 발급받기</button>
                `;
            }
        }
    </script>
</body>
</html>
