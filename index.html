<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>길목 (Gilmok)</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=c6fa90ad968fa722bdc6d58024097828&libraries=services"></script>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #fff8ef; }
        /* 지도가 들어갈 공간을 강제로 화면 전체 높이(100vh)로 고정 */
        #map { 
            width: 100%; 
            height: 100vh !important; 
            position: absolute; 
            top: 0; 
            left: 0; 
            z-index: 1; 
            background-color: #e5e7eb; /* 지도가 안 뜰 때를 대비한 회색 배경 */
        }
        .ui-layer { z-index: 10; position: relative; pointer-events: none; }
        .ui-layer button, .ui-layer nav { pointer-events: auto; }
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    </style>
</head>
<body>

    <div id="onboarding" class="fixed inset-0 z-[100] bg-[#fff8ef] flex flex-col items-center justify-center p-8 text-center">
        <h1 class="text-4xl font-extrabold text-[#944a00] mb-12 tracking-tighter italic">길목</h1>
        <div class="grid gap-5 w-full max-w-sm">
            <button onclick="selectRole('owner')" class="p-8 bg-white rounded-3xl shadow-sm text-left active:scale-95 transition-all border-none">
                <span class="material-symbols-outlined text-4xl text-[#944a00]">storefront</span>
                <h3 class="text-xl font-bold mt-2">사장님입니다</h3>
            </button>
            <button onclick="selectRole('user')" class="p-8 bg-white rounded-3xl shadow-sm text-left active:scale-95 transition-all border-none">
                <span class="material-symbols-outlined text-4xl text-[#5b6248]">shopping_bag</span>
                <h3 class="text-xl font-bold mt-2">손님입니다</h3>
            </button>
        </div>
    </div>

    <main id="main-app" class="hidden w-full h-full relative">
        <div id="map"></div>

        <div class="ui-layer h-full w-full flex flex-col items-center justify-between p-6 pb-32">
            <header class="w-full flex justify-between items-center">
                <div class="bg-white/90 px-4 py-2 rounded-full shadow-sm backdrop-blur-md">
                    <h1 class="text-lg font-black text-[#944a00]">길목</h1>
                </div>
                <button onclick="location.reload()" class="bg-white/90 p-2 rounded-full shadow-sm border-none pointer-events-auto">
                    <span class="material-symbols-outlined text-[#1e1b13]">logout</span>
                </button>
            </header>

            <div id="floating-card" class="w-full max-w-lg mb-4">
                <div class="bg-white rounded-3xl p-7 shadow-2xl border-none pointer-events-auto" id="card-content">
                    </div>
            </div>

            <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[92%] max-w-md h-20 glass-nav rounded-[2.5rem] flex items-center justify-around shadow-xl border border-white/20 pointer-events-auto">
                <div class="flex flex-col items-center text-[#944a00]">
                    <span class="material-symbols-outlined">map</span>
                    <span class="text-[9px] font-bold mt-1 uppercase">지도</span>
                </div>
                <div class="relative -top-7">
                    <button class="w-16 h-16 bg-gradient-to-br from-[#944a00] to-[#77574e] rounded-full shadow-2xl flex items-center justify-center text-white border-[5px] border-[#fff8ef] active:scale-90 transition-transform">
                        <span class="material-symbols-outlined text-3xl">bolt</span>
                    </button>
                </div>
                <div class="flex flex-col items-center text-stone-400">
                    <span class="material-symbols-outlined text-stone-400">person</span>
                    <span class="text-[9px] font-bold mt-1 uppercase">정보</span>
                </div>
            </nav>
        </div>
    </main>

    <script>
        var map;
        var centerPos = new kakao.maps.LatLng(37.3006, 127.0358); // 경기대 좌표

        function initMap() {
            var container = document.getElementById('map');
            // 지도가 그려질 상자가 존재하는지 확인
            if(!container) return;

            var options = { center: centerPos, level: 3 };
            map = new kakao.maps.Map(container, options);

            // 마커 표시
            new kakao.maps.Marker({ position: centerPos }).setMap(map);
        }

        function selectRole(role) {
            document.getElementById('onboarding').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            
            // 지도가 화면에 나타난 '후'에 그려야 함
            if (window.kakao && window.kakao.maps) {
                kakao.maps.load(function() {
                    initMap();
                    // 배포 환경에서 지도가 잘리거나 안 나오는 현상 방지 핵심 로직
                    setTimeout(function() {
                        map.relayout();
                        map.setCenter(centerPos);
                    }, 100);
                });
            }

            const card = document.getElementById('card-content');
            if (role === 'owner') {
                card.innerHTML = `<p class="text-[#944a00] font-bold text-[10px] uppercase mb-1">경기대 정문 상권</p><h2 class="text-2xl font-black mb-3">현재 유동인구 1,240명</h2><button class="w-full bg-[#944a00] text-white py-4 rounded-full font-bold shadow-lg border-none">동적 가격 규칙 실행</button>`;
            } else {
                card.innerHTML = `<p class="text-[#5b6248] font-bold text-[10px] uppercase mb-1">지금 내 주변 혜택</p><h2 class="text-2xl font-black mb-3">커피 40% 타임세일</h2><button class="w-full bg-gradient-to-br from-[#944a00] to-[#77574e] text-white py-4 rounded-full font-bold shadow-lg border-none">혜택 확인하기</button>`;
            }
        }
    </script>
</body>
</html>
