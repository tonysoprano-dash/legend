<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>길목 (Gilmok) - 디지털 화로</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=c6fa90ad968fa722bdc6d58024097828&libraries=services"></script>
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fff8ef; margin: 0; overflow: hidden; }
        #map { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 0; }
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    </style>
</head>
<body>

    <div id="onboarding" class="fixed inset-0 z-50 bg-[#fff8ef] flex flex-col items-center justify-center p-8 text-center transition-opacity duration-300">
        <h1 class="text-4xl font-extrabold text-[#944a00] mb-12 tracking-tighter">길목</h1>
        <div class="grid gap-5 w-full max-w-sm">
            <button onclick="selectRole('owner')" class="p-8 bg-white rounded-3xl shadow-sm text-left active:scale-95 transition-all border-none">
                <span class="material-symbols-outlined text-4xl text-[#944a00]">storefront</span>
                <h3 class="text-xl font-bold mt-2">사장님입니다</h3>
                <p class="text-sm text-stone-500">상권 분석 및 가격 설정</p>
            </button>
            <button onclick="selectRole('user')" class="p-8 bg-white rounded-3xl shadow-sm text-left active:scale-95 transition-all border-none">
                <span class="material-symbols-outlined text-4xl text-[#5b6248]">shopping_bag</span>
                <h3 class="text-xl font-bold mt-2">손님입니다</h3>
                <p class="text-sm text-stone-500">지금 내 주변 혜택 발견</p>
            </button>
        </div>
    </div>

    <main id="main-app" class="hidden w-full h-screen relative">
        <div id="map"></div>
        
        <div id="floating-card" class="absolute bottom-32 left-1/2 -translate-x-1/2 w-[92%] max-w-lg z-20">
            <div class="bg-white rounded-3xl p-7 shadow-2xl border-none">
                <div id="card-content"></div>
            </div>
        </div>

        <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[92%] max-w-md h-20 glass-nav rounded-[2.5rem] flex items-center justify-around z-30 shadow-xl border border-white/20">
            <div class="flex flex-col items-center text-[#944a00]">
                <span class="material-symbols-outlined">map</span>
                <span class="text-[9px] font-bold mt-1">지도</span>
            </div>
            <div class="relative -top-7">
                <button class="w-16 h-16 bg-gradient-to-br from-[#944a00] to-[#77574e] rounded-full shadow-2xl flex items-center justify-center text-white border-[5px] border-[#fff8ef] active:scale-90 transition-transform">
                    <span class="material-symbols-outlined text-3xl">bolt</span>
                </button>
            </div>
            <div class="flex flex-col items-center text-stone-400">
                <span class="material-symbols-outlined">person</span>
                <span class="text-[9px] font-bold mt-1">정보</span>
            </div>
        </nav>
    </main>

    <script>
        var map; // 전역 변수로 지도 선언
        var centerPos = new kakao.maps.LatLng(37.3006, 127.0358); // 경기대 수원캠퍼스 정문

        function drawMap() {
            var container = document.getElementById('map');
            var options = { center: centerPos, level: 3 };
            map = new kakao.maps.Map(container, options);

            // 마커 표시
            new kakao.maps.Marker({ position: centerPos }).setMap(map);
        }

        function selectRole(role) {
            // 1. 화면 전환 (지도가 있는 화면 표시)
            document.getElementById('onboarding').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            
            // 2. 사장님이 말씀하신 '타이밍' 문제 해결 로직
            if (window.kakao && window.kakao.maps) {
                kakao.maps.load(function() {
                    if (!map) {
                        drawMap(); // 처음 한 번만 지도 생성
                    }
                    
                    // [핵심] 숨겨져 있던 지도가 나타날 때 크기와 중심을 다시 잡아줌
                    setTimeout(function() {
                        map.relayout();
                        map.setCenter(centerPos);
                    }, 200); // 화면이 완전히 뜨는 시간을 벌기 위해 0.2초 여유
                });
            }

            // 3. 역할별 내용 표시
            const cardContent = document.getElementById('card-content');
            if (role === 'owner') {
                cardContent.innerHTML = `
                    <p class="text-[#944a00] font-bold text-[10px] mb-1 uppercase tracking-widest">경기대 정문 상권</p>
                    <h2 class="text-2xl font-black mb-3 text-[#1e1b13]">현재 유동인구 1,240명</h2>
                    <p class="text-sm text-stone-500 mb-6 leading-relaxed font-medium">지금이 '마중 가격' 규칙을 실행하기<br>가장 좋은 타이밍입니다.</p>
                    <button class="w-full bg-[#944a00] text-white py-4 rounded-full font-bold shadow-lg border-none active:scale-[0.98]">동적 가격 규칙 실행</button>
                `;
            } else {
                cardContent.innerHTML = `
                    <p class="text-[#5b6248] font-bold text-[10px] mb-1 uppercase tracking-widest">실시간 길목 혜택</p>
                    <h2 class="text-2xl font-black mb-3 text-[#1e1b13]">커피 40% 타임세일</h2>
                    <p class="text-sm text-stone-500 mb-6 leading-relaxed font-medium">사람들이 모여 가격이 내려갔어요!<br>지금 바로 쿠폰을 확인하세요.</p>
                    <button class="w-full bg-gradient-to-br from-[#944a00] to-[#77574e] text-white py-4 rounded-full font-bold shadow-lg border-none active:scale-[0.98]">혜택 확인하기</button>
                `;
            }
        }
    </script>
</body>
</html>
