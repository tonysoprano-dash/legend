<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <!-- [PWA] 앱 모드 최적화 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/tonysoprano-dash/legend/main/image_8.png">

    <title>길목 (Gilmok) - 비즈니스 인사이트</title>
    
    <!-- 디자인 자원 -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=e03666d901543f8d3c81beeddcd6f319&libraries=services"></script>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #f8f9fa; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* 지도 전체 화면 */
        #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* UI 레이어 */
        .app-ui { position: relative; z-index: 10; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; }
        .interactive { pointer-events: auto; }
        
        /* 글래스모피즘 효과 */
        .glass-premium {
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 12px 40px rgba(0,0,0,0.12);
        }

        /* 상단 검색바 스타일 */
        .search-container {
            margin: calc(env(safe-area-inset-top) + 12px) 16px 0;
            height: 54px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 12px;
            border-radius: 18px;
        }

        /* 스마트 인사이트 카드 고도화 */
        .insight-card {
            width: calc(100% - 32px);
            max-width: 360px;
            margin: 16px auto;
            border-radius: 28px;
            padding: 24px;
            position: absolute;
            top: 85px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            border: 1.5px solid #944a00;
        }

        /* 하단 탭 바 최적화 */
        .bottom-nav {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(0,0,0,0.06);
            padding-bottom: env(safe-area-inset-bottom);
            height: calc(70px + env(safe-area-inset-bottom));
        }

        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: #999; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .nav-item.active { color: #ff7e36; }
        .nav-item .material-symbols-outlined { font-size: 28px; transition: transform 0.2s; }
        .nav-item.active .material-symbols-outlined { transform: scale(1.1); }
        .nav-item span { font-size: 11px; font-weight: 700; }

        /* 플로팅 버튼 */
        .fab-action {
            background: #1e1b13;
            color: white;
            padding: 18px 32px;
            border-radius: 40px;
            font-weight: 800;
            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 17px;
        }

        /* 핫존 오버레이 */
        .hot-label {
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 800;
            color: white;
            border: 2px solid white;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
            white-space: nowrap;
        }

        /* 온보딩 애니메이션 */
        .logo-bounce { animation: bounce 2s infinite ease-in-out; }
        @keyframes bounce { 0%, 100% { transform: translateY(0) rotate(2deg); } 50% { transform: translateY(-10px) rotate(-2deg); } }

        .fade-up { animation: fadeUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <!-- 1. 프리미엄 온보딩 화면 -->
    <div id="onboarding" class="fixed inset-0 z-[100] bg-[#fff8ef] flex flex-col items-center justify-between p-12 py-24 text-center transition-all duration-700">
        <div class="flex flex-col items-center gap-8 mt-10">
            <div class="logo-bounce">
                <img src="https://raw.githubusercontent.com/tonysoprano-dash/legend/main/image_8.png" alt="길목 로고" class="w-28 h-28 rounded-[2.5rem] shadow-[0_20px_50px_rgba(148,74,0,0.2)] object-cover bg-white p-1">
            </div>
            <div>
                <h1 class="text-6xl font-extrabold text-[#944a00] tracking-tighter italic">길목</h1>
                <p class="text-[#77574e] font-bold text-xs uppercase tracking-[0.4em] mt-3 opacity-60">The Digital Hearth</p>
            </div>
        </div>
        <div class="grid gap-4 w-full interactive fade-up">
            <button onclick="startApp('owner')" class="w-full py-6 bg-[#1e1b13] text-white rounded-[2rem] font-bold text-xl shadow-2xl active:scale-[0.96] transition-all">사장님 대시보드</button>
            <button onclick="startApp('user')" class="w-full py-6 bg-white text-[#1e1b13] border-2 border-stone-100 rounded-[2rem] font-bold text-xl active:scale-[0.96] transition-all">손님으로 입장</button>
        </div>
    </div>

    <!-- 2. 메인 앱 레이아웃 -->
    <main id="main-app" class="hidden w-full h-full relative">
        <div id="map"></div>

        <div class="app-ui">
            <!-- 스마트 인사이트 카드 (사장님 전용) -->
            <div id="smart-insight" class="insight-card glass-premium hidden interactive fade-up">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-2">
                        <span class="material-symbols-outlined text-[#944a00] font-bold">query_stats</span>
                        <span class="text-xs font-black text-[#944a00] uppercase tracking-widest">Business Insight</span>
                    </div>
                    <button onclick="closeInsight()" class="text-stone-300 hover:text-stone-500 transition-colors"><span class="material-symbols-outlined">close</span></button>
                </div>
                
                <h3 class="text-xl font-black text-stone-900 leading-tight mb-4 tracking-tight">
                    근처 상권이 <span class="text-red-500">혼잡</span>합니다!<br>동적 가격을 제안할까요?
                </h3>
                
                <div class="bg-[#944a00]/5 rounded-2xl p-4 mb-5 border border-[#944a00]/10">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-xs font-bold text-stone-500">예상 추가 수익</span>
                        <span class="text-sm font-black text-[#944a00]">+24.5%</span>
                    </div>
                    <div class="text-2xl font-black text-[#1e1b13]">약 ₩48,500 <span class="text-xs font-medium text-stone-400">추가 이득</span></div>
                </div>
                
                <button onclick="publishPrice()" class="w-full bg-[#944a00] text-white py-4 rounded-2xl font-bold text-base shadow-lg shadow-[#944a00]/30 active:scale-[0.97] transition-all">
                    수익 극대화 시작하기
                </button>
            </div>

            <!-- 상단 검색바 -->
            <header class="search-container glass-premium interactive">
                <span class="material-symbols-outlined text-stone-400">search</span>
                <span class="flex-grow text-stone-400 font-bold text-[15px] tracking-tight">주변 핫존 및 상권 검색</span>
                <div class="w-px h-6 bg-stone-200"></div>
                <button onclick="location.reload()" class="text-stone-600"><span class="material-symbols-outlined">settings_power</span></button>
            </header>

            <div class="flex-grow"></div>

            <!-- 하단 액션 버튼 -->
            <div class="flex justify-center mb-8 interactive">
                <div id="owner-action" class="hidden">
                    <button onclick="publishPrice()" class="fab-action active:scale-95 transition-all">
                        <span class="material-symbols-outlined fill-1 text-orange-400">bolt</span>
                        동적 가격 실행
                    </button>
                </div>
                <div id="user-action" class="hidden">
                    <button class="bg-[#ff7e36] text-white px-10 py-5 rounded-[2.5rem] font-extrabold shadow-2xl active:scale-95 transition-all flex items-center gap-3">
                        <span class="material-symbols-outlined fill-1">confirmation_number</span>
                        내 주변 쿠폰 받기
                    </button>
                </div>
            </div>

            <!-- 당근마켓형 하단 탭 바 -->
            <nav class="bottom-nav flex interactive">
                <button class="nav-item active">
                    <span class="material-symbols-outlined fill-1">home</span>
                    <span>홈</span>
                </button>
                <button class="nav-item">
                    <span class="material-symbols-outlined">explore</span>
                    <span>내 근처</span>
                </button>
                <button class="nav-item">
                    <span class="material-symbols-outlined">forum</span>
                    <span>채팅</span>
                </button>
                <button class="nav-item">
                    <span class="material-symbols-outlined">account_circle</span>
                    <span>나의 길목</span>
                </button>
            </nav>
        </div>
    </main>

    <!-- 전송 알림 (토스트) -->
    <div id="toast" class="fixed top-28 left-1/2 -translate-x-1/2 z-[200] bg-black/85 backdrop-blur-xl text-white px-8 py-4 rounded-full font-bold text-sm hidden shadow-2xl border border-white/10 italic scale-90 transition-all">
        🚀 주변 소비자들에게 타임세일 알림을 보냈습니다!
    </div>

    <script>
        var map;
        var centerPos = new kakao.maps.LatLng(37.2988, 127.0444); 

        function startApp(role) {
            document.getElementById('onboarding').style.transform = 'translateY(-100%)';
            setTimeout(() => {
                document.getElementById('onboarding').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                initMap(role);
                
                if(role === 'owner') {
                    document.getElementById('owner-action').style.display = 'block';
                    setTimeout(() => {
                        document.getElementById('smart-insight').classList.remove('hidden');
                    }, 1200);
                } else {
                    document.getElementById('user-action').style.display = 'block';
                }
            }, 600);
        }

        function closeInsight() {
            document.getElementById('smart-insight').classList.add('hidden');
        }

        function initMap(role) {
            var container = document.getElementById('map');
            map = new kakao.maps.Map(container, { center: centerPos, level: 3 });

            // 내 가게 위치 커스텀 마커
            var shopContent = '<div style="width:32px; height:32px; background:#944a00; border:4px solid white; border-radius:50%; box-shadow:0 10px 20px rgba(148,74,0,0.4);"></div>';
            new kakao.maps.CustomOverlay({
                position: centerPos,
                content: shopContent
            }).setMap(map);

            // 상권 데이터 설정
            var hotspots = [
                { pos: new kakao.maps.LatLng(37.2995, 127.0455), count: 284, type: 'CROWDED' }, 
                { pos: new kakao.maps.LatLng(37.2985, 127.0440), count: 156, type: 'NORMAL' }, 
                { pos: new kakao.maps.LatLng(37.2975, 127.0450), count: 35, type: 'QUIET' }
            ];

            hotspots.forEach(spot => {
                var color, labelText;
                if(spot.type === 'CROWDED') {
                    color = '#FF4D4D'; labelText = '혼잡';
                    
                    if(role === 'owner') {
                        // 화살표 연결선 (애니메이션 효과를 위해 대시 스타일 적용)
                        new kakao.maps.Polyline({
                            path: [centerPos, spot.pos],
                            strokeWeight: 5,
                            strokeColor: '#944a00',
                            strokeOpacity: 0.6,
                            strokeStyle: 'dashed'
                        }).setMap(map);
                    }
                } else if(spot.type === 'NORMAL') {
                    color = '#FFAA00'; labelText = '보통';
                } else {
                    color = '#4CAF50'; labelText = '여유';
                }

                // 핫존 시각화 (은은한 그라데이션 효과를 위해 투명도 조절)
                new kakao.maps.Circle({
                    center: spot.pos,
                    radius: 75,
                    strokeWeight: 0,
                    fillColor: color,
                    fillOpacity: 0.2
                }).setMap(map);

                var content = `<div class="hot-label" style="background:${color};">${spot.count}명 (${labelText})</div>`;
                new kakao.maps.CustomOverlay({
                    position: spot.pos,
                    content: content,
                    yAnchor: 2.3
                }).setMap(map);
            });

            setTimeout(() => { map.relayout(); map.setCenter(centerPos); }, 200);
        }

        function publishPrice() {
            const toast = document.getElementById('toast');
            toast.classList.remove('hidden');
            toast.style.scale = "1";
            setTimeout(() => {
                toast.classList.add('hidden');
                toast.style.scale = "0.9";
            }, 3500);
            closeInsight();
        }
    </script>
</body>
</html>
