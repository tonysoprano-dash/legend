<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Dynamic Pricing Simulator</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">🚀 Dynamic Pricing AI</div>
            <div id="status-badge" class="badge">실시간 모니터링 중</div>
        </header>

        <main class="grid">
            <section class="card summary">
                <div class="stat-group">
                    <label>실시간 유동 인구</label>
                    <div id="current-pop" class="value">500</div>
                </div>
                <div class="stat-group">
                    <label>계산된 최적 가격</label>
                    <div id="current-price" class="value">₩10,000</div>
                </div>
                <div id="price-msg" class="msg">인구 밀도가 적정 수준입니다.</div>
            </section>

            <section class="card chart-container">
                <h3>가격 변동 실시간 트렌드</h3>
                <canvas id="priceChart"></canvas>
            </section>

            <section class="card controls">
                <h3>시뮬레이션 설정</h3>
                <div class="input-group">
                    <p>유동 인구 조절 (데이터 수동 주입)</p>
                    <input type="range" id="pop-slider" min="0" max="1000" value="500">
                    <div class="range-labels">
                        <span>낮음</span>
                        <span id="slider-val">500명</span>
                        <span>높음</span>
                    </div>
                </div>
                <div class="btn-group">
                    <button id="auto-btn" class="active">자동 시뮬레이션 ON</button>
                    <button id="reset-btn">데이터 초기화</button>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2024 Dynamic Pricing Project - Powered by Vercel</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
