<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>길목 (Gilmok)</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=c6fa90ad968fa722bdc6d58024097828&libraries=services"></script>
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fff8ef; overflow: hidden; }
        #map { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 0; }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(16px); }
    </style>
</head>
<body class="min-h-screen">

    <div id="onboarding" class="fixed inset-0 z-50 bg-[#fff8ef] flex flex-col items-center justify-center p-8">
        <div class="mb-10 text-center">
            <h1 class="text-4xl font-extrabold text-[#944a00] tracking-tighter">길목</h1>
            <p class="text-xs text-[#77574e] tracking-[0.2em] mt-1">THE DIGITAL HEARTH</p>
        </div>
        <div class="grid gap-4 w-full max-w-sm">
            <button onclick="selectRole('owner')" class="p-6 bg-white rounded-2xl shadow-sm text-left active:scale-95 transition-all">
                <span class="material-symbols-outlined text-3xl text-[#944a00]">storefront</span>
                <h3 class="font-bold text-lg mt-2">사장님입니다</h3>
            </button>
            <button onclick="selectRole('user')" class="p-6 bg-white rounded-2xl shadow-sm text-left active:scale-95 transition-all">
                <span class="material-symbols-outlined text-3xl text-[#5b6248]">shopping_bag</span>
                <h3 class="font-bold text-lg mt-2">손님입니다</h3>
            </button>
        </div>
    </div>

    <main id="main-app" class="hidden w-full h-screen relative">
        <div id="map"></div>
        <div class="absolute inset-0 bg-[#944a00]/[0.02] pointer-events-none z-10"></div>

        <div id="floating-card" class="absolute bottom-32 left-1/2 -translate-x-1/2 w-[92%] max-w-lg z-20">
            <div class="bg-white rounded-2xl p-6 shadow-2xl border-none">
                <div id="card-content"></div>
            </div>
        </div>

        <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[92%] max-w-md h-20 glass-nav rounded-3xl flex items-center justify-around z-30 shadow-lg">
            <div class="flex flex-col items-center text-[#944a00]">
                <span class="material-symbols-outlined">map</span>
                <span class="text-[10px] font-bold">지도</span>
            </div>
            <div class="relative -top-6">
                <button class="w-16 h-16 bg-gradient-to-br from-[#944a00] to-[#77574e] rounded-full shadow-xl flex items-center justify-center text-white border-[4px] border-[#fff8ef]">
                    <span class="material-symbols-outlined text-3xl">bolt</span>
                </button>
            </div>
            <div class="flex flex-col items-center text-stone-400">
                <span class="material-symbols-outlined">person</span>
                <span class="text-[10px] font-bold">정보</span>
            </div>
        </nav>
    </main>

    <script>
        function drawMap() {
            var container = document.getElementById('map');
            var options = { 
                center: new kakao.maps.LatLng(37.3006, 127.0358), // 경기대 수원캠 정문
                level: 3 
            };
            var map = new kakao.maps.Map(container, options); 
            
            // 경기대 정문 마커
            new kakao.maps.Marker({
                position: new kakao.maps.LatLng(37.3006, 127.0358)
            }).setMap(map);
        }

        function selectRole(role) {
            document.getElementById('onboarding').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            
            if (window.kakao && window.kakao.maps) {
                kakao.maps.load(drawMap);
            }

            const cardContent = document.getElementById('card-content');
            if (role === 'owner') {
                cardContent.innerHTML = `<h2 class="text-xl font-bold">현재 유동인구 1,240명</h2><p class="text-sm text-gray-500 mt-1">경기대 정문 상권 분석 데이터입니다.</p>`;
            } else {
                cardContent.innerHTML = `<h2 class="text-xl font-bold">커피 40% 타임세일</h2><p class="text-sm text-gray-500 mt-1">지금 '카페 온도'로 가면 할인!</p>`;
            }
        }
    </script>
</body>
</html>
