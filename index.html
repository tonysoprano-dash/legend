<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>길목 (Gilmok) - Digital Hearth</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=78c841012e66821152dd7a637eb222a1&libraries=services"></script>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #fff8ef; font-family: 'Plus Jakarta Sans', sans-serif; }
        #map { width: 100%; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; background-color: #eee; }
        .ui { z-index: 10; position: relative; pointer-events: none; }
        .ui button, .ui .card { pointer-events: auto; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    </style>
</head>
<body>

    <div id="onboarding" class="fixed inset-0 z-[100] bg-[#fff8ef] flex flex-col items-center justify-center p-8 text-center transition-all duration-500">
        <div class="mb-12 flex flex-col items-center gap-4">
            <div class="w-16 h-16 bg-[#ffdbc0] rounded-full flex items-center justify-center shadow-md text-[#944a00]">
                <span class="material-symbols-outlined text-4xl font-bold">local_fire_department</span>
            </div>
            <div>
                <h1 class="text-4xl font-extrabold text-[#944a00] tracking-tighter italic">길목</h1>
                <p class="text-[#77574e] font-bold text-[10px] uppercase tracking-[0.2em] mt-1 text-center">The Digital Hearth</p>
            </div>
        </div>
        <div class="grid gap-5 w-full max-w-sm">
            <button onclick="startApp('owner')" class="p-8 bg-white rounded-3xl shadow-sm text-left active:scale-95 transition-all font-bold text-lg border-none italic">사장님입니다</button>
            <button onclick="startApp('user')" class="p-8 bg-white rounded-3xl shadow-sm text-left active:scale-95 transition-all font-bold text-lg border-none italic">손님입니다</button>
        </div>
    </div>

    <main id="main-app" class="hidden w-full h-full relative">
        <div id="map"></div>
        <div class="ui h-full w-full flex flex-col justify-between p-6 pb-32">
            <header class="flex justify-between items-center">
                <div class="glass px-5 py-2 rounded-full shadow-sm font-black text-[#944a00] tracking-tight">길목</div>
                <button onclick="location.reload()" class="glass p-2 rounded-full shadow-sm border-none"><span class="material-symbols-outlined text-[#1e1b13]">logout</span></button>
            </header>
            <div id="card" class="card bg-white rounded-3xl p-7 shadow-2xl border-none"></div>
        </div>
    </main>

    <script>
        var map;
        var centerPos = new kakao.maps.LatLng(37.3006, 127.0358); // 경기대 수원캠

        function startApp(role) {
            document.getElementById('onboarding').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';

            // 지도를 띄우는 정석 코드
            var container = document.getElementById('map');
            var options = { center: centerPos, level: 3 };
            
            // 지도 생성 및 마커 찍기
            try {
                map = new kakao.maps.Map(container, options);
                new kakao.maps.Marker({ position: centerPos }).setMap(map);
                
                // [필수] 화면 전환 후 지도가 깨지는 현상 방지
                setTimeout(function() {
                    map.relayout();
                    map.setCenter(centerPos);
                }, 200);
            } catch (e) {
                console.error(e);
                alert("지도 로드에 실패했습니다. 카카오 도메인 설정을 확인해주세요.");
            }

            // 역할별 카드 업데이트
            const info = document.getElementById('card');
            if (role === 'owner') {
                info.innerHTML = `<h2 class="text-2xl font-black mb-1 italic">유동인구 1,240명</h2><p class="text-sm text-stone-500 mb-6 font-medium tracking-tight">경기대 정문 상권의 실시간 데이터입니다.</p><button class="w-full bg-[#944a00] text-white py-4 rounded-2xl font-bold border-none">동적 가격 규칙 실행</button>`;
            } else {
                info.innerHTML = `<h2 class="text-2xl font-black mb-1 italic">커피 40% 타임세일</h2><p class="text-sm text-stone-500 mb-6 font-medium tracking-tight">주변 매장에서 제공하는 실시간 혜택입니다.</p><button class="w-full bg-[#5b6248] text-white py-4 rounded-2xl font-bold border-none">쿠폰 확인하기</button>`;
            }
        }
    </script>
</body>
</html>
